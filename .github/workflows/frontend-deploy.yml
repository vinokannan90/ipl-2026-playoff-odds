name: Frontend Deploy (Static Web Apps)

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-deploy.yml']
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths: ['frontend/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Inject backend URL into staticwebapp.config.json + dev-config.js
        shell: bash
        run: |
          set -euo pipefail

          BACKEND_URL="${{ vars.BACKEND_URL }}"
          if [[ -z "${BACKEND_URL}" ]]; then
            echo "ERROR: vars.BACKEND_URL is not set"
            exit 1
          fi

          BACKEND_HOST="${BACKEND_URL#https://}"
          BACKEND_HOST="${BACKEND_HOST#http://}"

          sed -i "s|__BACKEND_URL__|${BACKEND_HOST}|g" frontend/staticwebapp.config.json

          # Write dev-config.js with literal placeholders (quoted heredoc = no shell expansion inside)
          cat > frontend/js/dev-config.js <<'EOF'
          // Generated at deploy time by frontend-deploy.yml
          window.__API_BASE__ = "__BACKEND_URL__";
          window.__APPINSIGHTS_CS__ = "__APPINSIGHTS_CONNECTION_STRING__";
          EOF

          # Replace placeholders after file is written (safe: no quoting hazards)
          sed -i "s|__BACKEND_URL__|${BACKEND_URL}|g" frontend/js/dev-config.js
          sed -i "s|__APPINSIGHTS_CONNECTION_STRING__|${{ vars.APPINSIGHTS_CONNECTION_STRING }}|g" frontend/js/dev-config.js

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          api_location: ''
          output_location: ''

  close_pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
