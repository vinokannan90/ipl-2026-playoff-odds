name: Frontend Deploy (Static Web Apps)

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-deploy.yml']
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths: ['frontend/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Inject backend URL into staticwebapp.config.json + dev-config.js
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          BACKEND_HOST="${BACKEND_URL#https://}"
          BACKEND_HOST="${BACKEND_HOST#http://}"
          sed -i "s|__BACKEND_URL__|${BACKEND_HOST}|g" frontend/staticwebapp.config.json
          # Override the dev-only auto-wire so the deployed page hits the
          # Container App via CORS (SWA Free doesn't support absolute rewrites).
          cat > frontend/js/dev-config.js <<EOF
          // Generated at deploy time by frontend-deploy.yml
          window.__API_BASE__ = "${BACKEND_URL}";
          EOF

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          api_location: ''
          output_location: ''

  close_pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
