name: Backend Deploy (Azure Container Apps)

on:
  push:
    branches: [main]
    paths: ['backend/**', 'infra/**', '.github/workflows/backend-deploy.yml']
  workflow_dispatch:

# Federated identity (OIDC) — NO long-lived secrets in repo.
# Required GitHub repo variables (Settings → Secrets and variables → Actions → Variables):
#   AZURE_CLIENT_ID         (App registration with federated credential)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#   AZURE_RG                (e.g. rg-iplodds-prod)
#   AZURE_CONTAINER_APP     (output: containerAppName)
#   AZURE_CONTAINER_ENV     (output: containerEnvName)
#   AZURE_CONTAINER_REGISTRY (ACR login server, e.g. iploddsacr7nw2b3.azurecr.io)
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "${{ vars.AZURE_CONTAINER_REGISTRY }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ vars.AZURE_CONTAINER_REGISTRY }}/iplodds-backend:${{ github.sha }}

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ vars.AZURE_CONTAINER_REGISTRY }}/iplodds-backend:${{ github.sha }}"
