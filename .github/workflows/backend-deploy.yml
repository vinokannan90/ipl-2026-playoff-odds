name: Backend Deploy (Azure Container Apps)

on:
  push:
    branches: [main]
    paths: ['backend/**', 'infra/**', '.github/workflows/backend-deploy.yml']
  workflow_dispatch:

# Federated identity (OIDC) — NO long-lived secrets in repo.
# Required GitHub repo variables (Settings → Secrets and variables → Actions → Variables):
#   AZURE_CLIENT_ID         (App registration with federated credential)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#   AZURE_RG                (e.g. rg-iplodds-prod)
#   AZURE_CONTAINER_APP     (output: containerAppName)
#   AZURE_CONTAINER_ENV     (output: containerEnvName)
permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/iplodds-backend:${{ github.sha }}
          provenance: true
          sbom: true

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "ghcr.io/${{ github.repository_owner }}/iplodds-backend:${{ github.sha }}"
